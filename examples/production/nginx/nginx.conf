# Nginx configuration: TLS termination + Layer 7 in front of dpivot
#
# Topology:
#   client → nginx:443 (TLS) → dpivot-proxy-api:3000 (TCP) → api:3000
#
# Place TLS cert/key at:
#   examples/production/nginx/certs/server.crt
#   examples/production/nginx/certs/server.key
#
# Generate a self-signed cert for testing:
#   mkdir -p examples/production/nginx/certs
#   openssl req -x509 -newkey rsa:4096 -keyout certs/server.key \
#     -out certs/server.crt -days 365 -nodes -subj '/CN=localhost'

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Structured access log for easier parsing.
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr"}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;       # don't reveal nginx version

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 30 req/s per IP with a burst of 60. Adjust to your traffic profile.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_status 429;

    # ── Upstream: dpivot TCP proxy ────────────────────────────────────────────
    # nginx connects to dpivot-proxy-api on the dpivot_mesh network.
    # dpivot owns zero-downtime; nginx just forwards.
    upstream dpivot_backend {
        server dpivot-proxy-api:3000;

        # Keep connections alive to dpivot to reduce TCP handshake overhead.
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenges through without redirect.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS (TLS termination) ───────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Modern TLS settings (TLS 1.2+ only).
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;

        # ── Health check pass-through (no rate limiting) ──────────────────────
        location /health {
            # Forward to dpivot /health/ready so load balancers know when
            # the proxy has no active backends.
            proxy_pass http://dpivot_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── API traffic ───────────────────────────────────────────────────────
        location / {
            # Rate limit (burst allows short spikes, nodelay rejects overflow immediately).
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass http://dpivot_backend;

            # Forward real client info to the app.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keep connections to dpivot alive (matches upstream keepalive).
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Timeouts: give the app time to respond but fail fast on errors.
            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Retry on upstream errors ONLY for safe (idempotent) methods.
            # POST/PATCH are excluded to prevent double-mutations.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}
